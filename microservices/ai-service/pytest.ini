# pytest.ini
# ==========
# Drop this file in the project root (same level as main.py).
# pytest reads it automatically.

[pytest]

# Where to find tests — pytest will collect test_*.py files here
testpaths = tests

# Show the 10 slowest tests after each run — helps you spot accidental
# integration tests sneaking into the unit test suite
# (unit tests should run in milliseconds; anything > 100ms is suspicious)
# --durations is passed on the CLI, not here, but leaving as a reminder

# Plugins required:
#   pytest-asyncio  — handles async test functions
asyncio_mode = auto

# Markers — declare custom marks here to avoid PytestUnknownMarkWarning
markers =
    unit: Pure unit tests — no I/O, no network, fast
    integration: Tests that hit real external services (run separately in CI)
    slow: Tests expected to take > 1 second

# Output — short traceback format is easier to read for most failures
# Use --tb=long on the CLI when you need the full traceback
addopts = --tb=short -q